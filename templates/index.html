<!DOCTYPE html>
<html>
<head>
    <title>Content Request Form</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fb;
        }

        .form-card {
            max-width: 900px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        .title {
            font-weight: 700;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

<div class="form-card">

    <h2 class="title text-center">AI Content Request Form</h2>

    <form action="/submit" method="POST">

        <div class="row g-3">

            <div class="col-md-6">
                <label class="form-label">Client Name</label>
                <input type="text" name="client" class="form-control" placeholder="Enter client name" required>
            </div>

            <div class="col-md-6">
                <label class="form-label">Brand Name</label>
                <input type="text" name="brand" class="form-control" placeholder="Enter brand name" required>
            </div>

            <div class="col-md-12">
                <label class="form-label">Request Title</label>
                <input type="text" name="title" class="form-control" placeholder="Enter request title" required>
            </div>

            <div class="col-md-12">
                <label class="form-label">Request Description</label>
                <textarea name="description" class="form-control" rows="4" placeholder="Describe your campaign request..." required></textarea>
            </div>

            <div class="col-md-6">
                <label class="form-label">Target Audience</label>
                <input type="text" name="audience" class="form-control" placeholder="e.g. Women 18-30">
            </div>

            <div class="col-md-6">
                <label class="form-label">Platform</label>
                <select name="platform" class="form-select" required>
                    <option>Instagram</option>
                    <option>Facebook</option>
                    <option>LinkedIn</option>
                    <option>YouTube</option>
                    <option>Website</option>
                    <option>Email Marketing</option>
                </select>
            </div>

            <div class="col-md-6">
                <label class="form-label">Deadline</label>
                <input type="date" name="deadline" class="form-control" required>
            </div>

            <div class="col-md-6">
                <label class="form-label">Priority</label>
                <select name="priority" class="form-select" required>
                    <option>Low</option>
                    <option>Medium</option>
                    <option>High</option>
                    <option>Urgent</option>
                </select>
            </div>

            <div class="col-12 text-center mt-3">
                <button type="submit" class="btn btn-primary px-5">
                    Submit Request
                </button>
            </div>

        </div>

    </form>

</div>

</body>
</html>
